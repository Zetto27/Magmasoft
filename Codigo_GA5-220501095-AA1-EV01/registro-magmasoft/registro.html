<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Registro - MagmaSoft</title>

    <link rel="stylesheet" href="registro.css" />

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <div class="register-card">
        <img src="img/logo.png" class="logo" />

        <h2>Registro de usuario</h2>

        <form>
          <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Nombres" required />
          </div>

          <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Apellidos" required />
          </div>

          <div class="input-group">
            <i class="fa fa-id-card"></i>
            <input type="text" placeholder="Cédula" required />
          </div>

          <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" placeholder="Correo electrónico" required />
          </div>

          <div class="input-group">
            <i class="fa fa-phone"></i>
            <input type="tel" placeholder="Número de teléfono" required />
          </div>

          <button class="register-btn">Crear cuenta</button>

          <p class="login-link">
            ¿Ya tienes una cuenta?
            <a href="/Codigo_GA5-220501095-AA1-EV01/magmasoft-login/index.html">Iniciar sesión</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
